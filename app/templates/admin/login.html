<!DOCTYPE html>
<html lang="fr" class="light-style layout-menu-fixed" dir="ltr">
<head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
    />

    <title>Connexion | DD Photographie Admin</title>

    <meta name="description" content="" />

    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='admin/assets/img/favicon/favicon.ico') }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/vendor/fonts/boxicons.css') }}" />

    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/vendor/css/core.css') }}" class="template-customizer-core-css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/vendor/css/theme-default.css') }}" class="template-customizer-theme-css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/css/demo.css') }}" />

    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.css') }}" />

    <link rel="stylesheet" href="{{ url_for('static', filename='admin/assets/vendor/css/pages/page-auth.css') }}" />
    
    <script src="{{ url_for('static', filename='admin/assets/vendor/js/helpers.js') }}"></script>

    <script src="{{ url_for('static', filename='admin/assets/js/config.js') }}"></script>
  </head>

<body>
    <!-- Content -->

    <div class="container-xxl">
        <div class="authentication-wrapper authentication-basic container-p-y">
            <div class="authentication-inner">
                <div class="card">
                    <div class="card-body">
                        <div class="app-brand justify-content-center">
                            <a href="/" class="app-brand-link gap-2">
                                <span class="app-brand-logo demo">
                                    <img src="{{ url_for('static', filename='img/core-img/logo.png') }}" alt="Logo" style="max-width: 40px;">
                                </span>
                                <span class="app-brand-text demo text-body fw-bolder">DD Photo Admin</span>
                            </a>
                        </div>
                        
                        <h4 class="mb-2">Bienvenue ! 👋</h4>
                        <p class="mb-4">Connectez-vous pour gérer votre portfolio</p>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                          {% if messages %}
                            {% for category, message in messages %}
                              <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                              </div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}

                        <form id="formAuthentication" class="mb-3" action="{{ url_for('admin.login') }}" method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label">Nom d'utilisateur</label>
                                <input type="text" class="form-control" id="email" name="username" placeholder="Entrez votre pseudo" required autofocus />
                            </div>
                            <div class="mb-3 form-password-toggle">
                                <div class="d-flex justify-content-between">
                                    <label class="form-label" for="password">Mot de passe</label>
                                </div>
                                <div class="input-group input-group-merge">
                                    <input type="password" id="password" class="form-control" name="password" placeholder="············" required />
                                    <span class="input-group-text cursor-pointer"><i class="bx bx-hide"></i></span>
                                </div>
                            </div>
                            <div class="mb-3">
                                <button class="btn btn-primary d-grid w-100" type="submit">Se connecter</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin/assets/vendor/libs/jquery/jquery.js') }}"></script>
    <script src="{{ url_for('static', filename='admin/assets/vendor/libs/popper/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='admin/assets/vendor/js/bootstrap.js') }}"></script>
    <script src="{{ url_for('static', filename='admin/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js') }}"></script>

    <script src="{{ url_for('static', filename='admin/assets/vendor/js/menu.js') }}"></script>
    <script src="{{ url_for('static', filename='admin/assets/js/main.js') }}"></script>

    <script async defer src="https://buttons.github.io/buttons.js"></script>
</body>
</html>
