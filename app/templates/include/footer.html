<footer class="footer-area" style="background: rgba(255, 255, 255, 0); border-top: 1px solid #ebebeb; padding: 0px 0 0px !important;">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="copywrite-text text-center mt-30" style="margin-top: 20px; padding: 0px 0 0px !important;">

                    <p style="font-size: 12px; color: #1d1d1da9;">
                        <a href="https://maps.google.com/?q={{ site_settings.address }}" target="_blank">
                            <i class="fa fa-map-marker" style="color:#ed9125;" aria-hidden="true"></i>
                            <span style="color: #1d1d1d;">{{ site_settings.address }}</span>
                        </a> 
                        <a href="https://wa.me/{{ site_settings.phone | replace(' ', '') }}">
                            <i class="fa fa-whatsapp" style="color:#ed9125;" aria-hidden="true"></i>
                            <span style="color: #1d1d1d;">{{ site_settings.phone }}</span>
                        </a> 
                        <a href="mailto:{{ site_settings.email }}">
                            <i class="fa fa-envelope-o" style="color:#ed9125;" aria-hidden="true"></i>
                            <span style="color: #1d1d1d;">{{ site_settings.email }}</span>
                        </a>
                        &copy; <script>document.write(new Date().getFullYear());</script> 
                        <strong>{{ site_settings.name }}</strong>. Tous droits réservés. 
                        Conçu avec <i class="fa fa-heart" style="color: #ed9125;"></i>
                        
                    </p>
                </div>
            </div>
        </div>
    </div>
</footer>
