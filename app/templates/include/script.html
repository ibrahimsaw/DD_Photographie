<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script>
    window.addEventListener('load', function() {
        const img = document.getElementById('aboutImage');
        
        // On s'assure que l'image est bien chargée
        if (img.complete) {
            applyDynamicColor();
        } else {
            img.addEventListener('load', applyDynamicColor);
        }

        function applyDynamicColor() {
            try {
                // 1. Création d'un canvas invisible pour analyser l'image
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;

                // 2. Dessiner l'image dans le canvas
                context.drawImage(img, 0, 0, img.width, img.height);

                // 3. Récupérer les données du pixel (x, y, width, height)
                // Ici, on prend le pixel tout en haut à gauche (0, 0)
                const pixelData = context.getImageData(0, 0, 1, 1).data;
                
                // pixelData est un tableau [R, G, B, A]
                const r = pixelData[0];
                const g = pixelData[1];
                const b = pixelData[2];
                const color = `rgb(${r}, ${g}, ${b})`;
                
                // 4. Appliquer cette couleur au bord et à l'ombre de l'image
                img.style.border = `0px solid ${color}`;
                img.style.boxShadow = `0 15px 40px ${color}`;

                // Optionnel : Debug dans la console
                console.log(`Couleur détectée : ${color}`);

            } catch (e) {
                // En cas d'erreur (souvent dû au Cross-Origin si l'image vient d'un autre domaine)
                console.error("Impossible d'extraire la couleur de l'image :", e);
                // Tu peux appliquer une couleur par défaut ici si tu veux
            }
        }
    });
</script>
